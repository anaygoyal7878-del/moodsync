name: MoodSyncCompanionApp
options:
  bundleIdPrefix: com.moodsync
  deploymentTarget:
    iOS: "17.0"
packages:
  MoodSyncCompanion:
    path: ../MoodSyncCompanion
targets:
  MoodSyncCompanionApp:
    type: application
    platform: iOS
    sources:
      - path: MoodSyncCompanionApp
    dependencies:
      - package: MoodSyncCompanion
        product: MoodSyncCompanion
      - package: MoodSyncCompanion
        product: MoodSyncCompanionUI
    info:
      path: MoodSyncCompanionApp/Info.plist
      properties:
        UILaunchScreen: {}
        NSHealthShareUsageDescription: "MoodSync reads your heart rate, sleep, and activity data to automate your smart home based on how you're feeling."
        NSHomeKitUsageDescription: "MoodSync activates HomeKit scenes you've configured (like \"Relax\" or \"Focus\") based on your biometrics."
        NSLocationWhenInUseUsageDescription: "MoodSync uses your location to detect when you arrive at or leave the home region you set, so it can trigger arrival/departure automations."
        NSLocationAlwaysAndWhenInUseUsageDescription: "MoodSync monitors your home region in the background so arrival/departure automations still fire when the app isn't open."
        UIBackgroundModes:
          - fetch
          - location
        # Dev-only exception, not a blanket ATS bypass: NSAllowsLocalNetworking
        # (confirmed against Apple's own Info.plist key reference — see
        # docs/IOS_REAL_DEVICE_SETUP_GUIDE.md's citations) allows plain HTTP
        # only to hosts on the device's local network (RFC1918 addresses,
        # .local hostnames) — exactly "your Mac's dev server on the same
        # Wi-Fi," and nothing else. Remove this once the backend has a real
        # HTTPS deployment; it should never ship to the App Store pointed at
        # a plain-HTTP production URL.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        # Placeholder — replace with your own explicit bundle ID once
        # you register an App ID with the HealthKit capability (see
        # docs/APPLE_HEALTH_DEVELOPER_GUIDE.md §2). Without a paid
        # Apple Developer Program account this can stay as-is for
        # Simulator builds, which don't need HealthKit entitlement
        # provisioning the same way a physical device does.
        PRODUCT_BUNDLE_IDENTIFIER: com.moodsync.companion
        CODE_SIGN_ENTITLEMENTS: MoodSyncCompanionApp/MoodSyncCompanionApp.entitlements
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
